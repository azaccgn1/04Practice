name: Deployment exercise 2
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Test Run
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Deploy
        run: echo "Deploying ............"
