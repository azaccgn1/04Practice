name: Deployment exercise 1
on: push
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run test
        run: npm run test

      - name: Run Build
        run: npm run build

      - name: Deploy
        run: echo "Deploying ............"
